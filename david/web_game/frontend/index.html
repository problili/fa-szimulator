<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Fa-szimulátor</title>

    <link rel="stylesheet" href="/static/style.css">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

    <!-- IMPORTANT: ensure map has height -->
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        .layout {
            display: flex;
            height: 100vh;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #map {
            flex: 1;
            min-height: 300px;   /* CRITICAL */
            width: 100%;
        }
    </style>
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <button type="button" onclick="openProfile()">Profile</button>
        <button type="button" onclick="openMissions()">Missions</button>
        <button type="button" onclick="openQuiz()">Quiz</button>

        <button type="button" id="touringButton" onclick="toggleTouring()">
            Touring
        </button>

        <button type="button" onclick="endTurn()">End Turn</button>

    </div>

    <!-- MAIN AREA -->
    <div class="main">

        <div class="topbar">
            <div id="time">Loading...</div>
        </div>

        <!-- MAP (must exist before JS runs) -->
        <div id="map"></div>

        <!-- RESOURCES -->
        <div class="resources">
            <div id="resources">Loading...</div>
        </div>

    </div>

</div>

<!-- QUIZ PANEL -->
<div id="quizPanel" class="side-panel hidden">
    <button type="button" class="close-panel-button" onclick="closeQuiz()">×</button>

    <h2>Quiz</h2>

    <div id="quizMenu">
        <button type="button" onclick="openLearning()">Tudás növesztés</button>
        <button type="button" onclick="openQuizGame()">Móka</button>
    </div>

    <div id="learningView" class="hidden">
        <h3>Nevezetes fák történetei</h3>
        <div id="storiesList"></div>
    </div>

    <div id="quizView" class="hidden">
        <h3>Quiz</h3>
        <div id="quizQuestionBox"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- IMPORTANT: order matters -->
<script src="/static/maps/districts.js"></script>
<script src="/static/maps/edges.js"></script>
<script src="/static/maps/trees.js"></script>
<script src="/static/maps/touring.js"></script>
<script src="/static/quiz.js"></script>

<script src="/static/app.js"></script>

</body>
</html>
