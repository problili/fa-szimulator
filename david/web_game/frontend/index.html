<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Fa-szimulátor</title>

    <link rel="stylesheet" href="/static/style.css">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
</head>

<body>

<div class="layout">

    <div class="sidebar">

        <button onclick="openProfile()">Profile</button>
        <button onclick="openMissions()">Missions</button>

        <button id="touringButton" onclick="toggleTouring()">
            Touring
        </button>

        <button onclick="endTurn()">End Turn</button>

    </div>

    <div class="main">

        <div class="topbar">
            <div id="time"></div>
        </div>

        <!-- IMPORTANT: ensure map has height in CSS -->
        <div id="map"></div>

        <div class="resources">
            <div id="resources"></div>
        </div>

    </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="/static/app.js"></script>
<script src="/static/maps/touring.js"></script>

</body>
</html>
